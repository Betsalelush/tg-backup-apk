name: Sentry to Telegram relay

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore relay state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: sentry-relay-state-${{ github.run_id }}
          restore-keys: |
            sentry-relay-state-

      - name: Check Sentry for new issues and forward to Telegram
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 scripts/sentry_telegram_relay.py

      - name: Save relay state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: sentry-relay-state-${{ github.run_id }}
